title: Insider Threat - Sensitive File Access via PowerShell
id: a1b2c3d4-1001-4000-a000-000000000001
status: experimental
description: Detects PowerShell accessing files in sensitive company directories
author: Blue Team SOC
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1005/
logsource:
    product: windows
    category: ps_script
detection:
    selection:
        ScriptBlockText|contains:
            - 'C:\SensitiveData'
            - 'C:\ConfidentialProjects'
            - 'Get-Content'
            - 'Copy-Item'
    condition: selection
falsepositives:
    - Legitimate admin file operations
level: high
tags:
    - attack.collection
    - attack.t1005
---
title: Insider Threat - USB Storage Device Connected
id: a1b2c3d4-1002-4000-a000-000000000002
status: experimental
description: Detects USB storage device connections via driver installation events
author: Blue Team SOC
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1052/001/
logsource:
    product: windows
    service: system
detection:
    selection:
        EventID: 20001
    filter:
        DeviceId|contains: 'USBSTOR'
    condition: selection
falsepositives:
    - Authorized USB devices
level: high
tags:
    - attack.exfiltration
    - attack.t1052.001
---
title: Insider Threat - Suspicious PowerShell Encoded Command
id: a1b2c3d4-1003-4000-a000-000000000003
status: experimental
description: Detects PowerShell execution with encoded commands or suspicious flags
author: Blue Team SOC
date: 2024/01/15
logsource:
    product: windows
    category: process_creation
detection:
    selection_encoded:
        CommandLine|contains:
            - '-enc'
            - '-EncodedCommand'
            - 'FromBase64String'
    selection_hidden:
        CommandLine|contains|all:
            - '-WindowStyle'
            - 'Hidden'
    selection_bypass:
        CommandLine|contains:
            - '-ExecutionPolicy Bypass'
            - '-ep bypass'
    condition: selection_encoded or selection_hidden or selection_bypass
falsepositives:
    - Some legitimate admin scripts use encoded commands
level: high
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027
---
title: Insider Threat - Security Event Log Cleared
id: a1b2c3d4-1004-4000-a000-000000000004
status: stable
description: Detects clearing of Windows Security event log - strong anti-forensics indicator
author: Blue Team SOC
date: 2024/01/15
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 1102
    condition: selection
falsepositives:
    - Legitimate log rotation (very rare for Security log)
level: critical
tags:
    - attack.defense_evasion
    - attack.t1070.001
---
title: Insider Threat - After Hours Interactive Logon
id: a1b2c3d4-1005-4000-a000-000000000005
status: experimental
description: Detects interactive logons during non-business hours (10PM-5AM)
author: Blue Team SOC
date: 2024/01/15
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4624
        LogonType:
            - 2
            - 10
            - 11
    timeframe: 22:00-05:00
    condition: selection
falsepositives:
    - Authorized after-hours work
    - Shift workers
level: medium
tags:
    - attack.initial_access
    - attack.t1078
