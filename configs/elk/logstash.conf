# ELK Stack - Logstash Pipeline Configuration
# Deploy to: /etc/logstash/conf.d/insider-threat.conf
# Parses and enriches Windows event logs for insider threat detection

input {
  # Beats input (Filebeat/Winlogbeat)
  beats {
    port => 5044
    ssl => false
    tags => ["beats"]
  }

  # Wazuh alerts JSON
  file {
    path => "/var/ossec/logs/alerts/alerts.json"
    codec => json
    type => "wazuh-alerts"
    tags => ["wazuh"]
  }
}

filter {
  # ==================== WAZUH ALERTS ====================
  if [type] == "wazuh-alerts" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    
    mutate {
      add_field => { "data_source" => "wazuh" }
    }

    # Tag insider threat rules
    if [rule][id] >= 100000 and [rule][id] <= 100999 {
      mutate {
        add_tag => ["insider_threat"]
        add_field => { "alert_category" => "insider_threat" }
      }
    }

    # Enrich with MITRE ATT&CK
    if [rule][mitre][id] {
      mutate {
        add_field => { "mitre_technique" => "%{[rule][mitre][id]}" }
      }
    }
  }

  # ==================== WINDOWS EVENT LOGS (via Winlogbeat) ====================
  if [agent][type] == "winlogbeat" {
    # Parse logon events
    if [event][code] == 4624 or [event][code] == 4625 {
      mutate {
        add_tag => ["authentication"]
        add_field => { "event_category" => "authentication" }
      }

      # Enrich logon type
      if [winlog][event_data][LogonType] {
        translate {
          field => "[winlog][event_data][LogonType]"
          destination => "logon_type_description"
          dictionary => {
            "2" => "Interactive (Local)"
            "3" => "Network"
            "4" => "Batch"
            "5" => "Service"
            "7" => "Unlock"
            "8" => "NetworkCleartext"
            "9" => "NewCredentials"
            "10" => "RemoteInteractive (RDP)"
            "11" => "CachedInteractive"
          }
        }
      }

      # After-hours detection
      ruby {
        code => '
          t = event.get("@timestamp")
          if t
            hour = t.hour
            if hour >= 22 || hour <= 5
              event.set("after_hours", true)
              event.set("risk_score", (event.get("risk_score") || 0) + 30)
            end
          end
        '
      }
    }

    # Parse Sysmon events
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate {
        add_tag => ["sysmon"]
        add_field => { "event_category" => "endpoint" }
      }

      # Process Creation (Event ID 1)
      if [event][code] == 1 {
        # Detect suspicious processes
        if [winlog][event_data][Image] =~ /(?i)(mimikatz|procdump|psexec|cobaltstrike)/ {
          mutate {
            add_tag => ["suspicious_process", "critical"]
            add_field => { "threat_level" => "critical" }
          }
        }

        # Detect LOLBins
        if [winlog][event_data][Image] =~ /(?i)(certutil|bitsadmin|mshta|regsvr32|rundll32)/ {
          if [winlog][event_data][CommandLine] =~ /(?i)(http|ftp|download|urlcache)/ {
            mutate {
              add_tag => ["lolbin_abuse", "high"]
              add_field => { "threat_level" => "high" }
            }
          }
        }
      }

      # LSASS Access (Event ID 10)
      if [event][code] == 10 {
        if [winlog][event_data][TargetImage] =~ /(?i)lsass\.exe/ {
          mutate {
            add_tag => ["credential_access", "critical"]
            add_field => { "threat_level" => "critical" }
          }
        }
      }

      # Network Connection (Event ID 3) - Cloud upload detection
      if [event][code] == 3 {
        if [winlog][event_data][DestinationHostname] =~ /(?i)(drive\.google|dropbox|mega\.nz|onedrive|wetransfer|pastebin)/ {
          mutate {
            add_tag => ["cloud_exfiltration", "high"]
            add_field => { "threat_level" => "high" }
          }
        }
      }
    }

    # Security Log Cleared
    if [event][code] == 1102 {
      mutate {
        add_tag => ["log_cleared", "critical", "anti_forensics"]
        add_field => { "threat_level" => "critical" }
      }
    }

    # PowerShell Script Block Logging
    if [winlog][channel] == "Microsoft-Windows-PowerShell/Operational" and [event][code] == 4104 {
      mutate {
        add_tag => ["powershell"]
        add_field => { "event_category" => "execution" }
      }

      if [winlog][event_data][ScriptBlockText] =~ /(?i)(Invoke-Mimikatz|Invoke-Kerberoast|FromBase64String|DownloadString|Net\.WebClient)/ {
        mutate {
          add_tag => ["suspicious_powershell", "critical"]
          add_field => { "threat_level" => "critical" }
        }
      }
    }
  }

  # ==================== RISK SCORING ====================
  ruby {
    code => '
      risk = event.get("risk_score") || 0
      tags = event.get("tags") || []
      
      risk += 50 if tags.include?("critical")
      risk += 30 if tags.include?("high")
      risk += 20 if tags.include?("credential_access")
      risk += 20 if tags.include?("cloud_exfiltration")
      risk += 15 if tags.include?("log_cleared")
      risk += 15 if tags.include?("suspicious_powershell")
      risk += 10 if tags.include?("insider_threat")
      
      event.set("risk_score", risk)
      
      if risk >= 50
        event.set("risk_level", "critical")
      elsif risk >= 30
        event.set("risk_level", "high")
      elsif risk >= 15
        event.set("risk_level", "medium")
      else
        event.set("risk_level", "low")
      end
    '
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["https://192.168.56.40:9200"]
    index => "insider-threat-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ES_PASSWORD}"
    ssl_certificate_verification => false
  }

  # High-severity alerts to separate index
  if "critical" in [tags] or "high" in [tags] {
    elasticsearch {
      hosts => ["https://192.168.56.40:9200"]
      index => "insider-threat-alerts-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ES_PASSWORD}"
      ssl_certificate_verification => false
    }
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
