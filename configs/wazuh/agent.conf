<!--
  Wazuh Shared Agent Configuration - Insider Threat Lab
  Deploy to: /var/ossec/etc/shared/default/agent.conf
-->
<agent_config os="windows">
  <!-- Security Events -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query><QueryList><Query Id="0" Path="Security">
      <Select Path="Security">*[System[(EventID=4624 or EventID=4625 or EventID=4634 or EventID=4648 or EventID=4672 or EventID=1102 or EventID=4688 or EventID=4698 or EventID=4720 or EventID=4726 or EventID=4740 or EventID=4656 or EventID=4663 or EventID=4768 or EventID=4769 or EventID=4778 or EventID=4779)]]</Select>
    </Query></QueryList></query>
  </localfile>

  <!-- System Events -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
    <query><QueryList><Query Id="0" Path="System">
      <Select Path="System">*[System[(EventID=7045 or EventID=7040 or EventID=20001 or EventID=20003)]]</Select>
    </Query></QueryList></query>
  </localfile>

  <!-- Sysmon -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- PowerShell Script Block Logging -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
    <query><QueryList><Query Id="0" Path="Microsoft-Windows-PowerShell/Operational">
      <Select Path="Microsoft-Windows-PowerShell/Operational">*[System[(EventID=4104 or EventID=4103)]]</Select>
    </Query></QueryList></query>
  </localfile>

  <!-- Windows PowerShell Classic -->
  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- RDP Sessions -->
  <localfile>
    <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows Defender -->
  <localfile>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Task Scheduler -->
  <localfile>
    <location>Microsoft-Windows-TaskScheduler/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- USB/PnP Events -->
  <localfile>
    <location>Microsoft-Windows-DriverFrameworks-UserMode/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- FILE INTEGRITY MONITORING -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\SensitiveData</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\ConfidentialProjects</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">C:\Users\Public\Documents</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\drivers\etc</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\config</directories>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry arch="both">HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Enum\USBSTOR</windows_registry>
    <ignore>C:\Windows\Temp</ignore>
    <ignore type="sregex">\.(log|tmp|etl)$</ignore>
  </syscheck>

  <!-- SYSCOLLECTOR -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>
</agent_config>
