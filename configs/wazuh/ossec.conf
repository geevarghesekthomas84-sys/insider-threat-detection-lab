<!--
  Wazuh Manager Configuration - Insider Threat Detection Lab
  Deploy to: /var/ossec/etc/ossec.conf (Wazuh Manager)
  
  This configuration enables:
  - Agent management and enrollment
  - File Integrity Monitoring (FIM)
  - Log collection and analysis
  - Active Response capabilities
  - Vulnerability detection
  - CIS-CAT benchmarking
-->

<ossec_config>

  <!-- ==================== GLOBAL SETTINGS ==================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.com</smtp_server>
    <email_from>wazuh@insiderthreatlab.local</email_from>
    <email_to>soc-team@insiderthreatlab.local</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ==================== MANAGER SETTINGS ==================== -->
  <alerts>
    <log_alert_level>1</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ==================== REMOTE SETTINGS ==================== -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ==================== ENROLLMENT SETTINGS ==================== -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>yes</use_password>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>/var/ossec/etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>/var/ossec/etc/sslmanager.key</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>

  <!-- ==================== CLUSTER SETTINGS ==================== -->
  <cluster>
    <name>wazuh-cluster</name>
    <node_name>manager-node</node_name>
    <node_type>master</node_type>
    <key>InsiderThreatLabClusterKey2024</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>192.168.56.40</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

  <!-- ==================== VULNERABILITY DETECTION ==================== -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <feed-update-interval>60m</feed-update-interval>
    <index-status>yes</index-status>
  </vulnerability-detection>

  <!-- ==================== INDEXER SETTINGS ==================== -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://192.168.56.40:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/filebeat/certs/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/filebeat/certs/filebeat.pem</certificate>
      <key>/etc/filebeat/certs/filebeat-key.pem</key>
    </ssl>
  </indexer>

  <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Critical system directories to monitor -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/bin,/sbin,/boot</directories>
    
    <!-- Monitor sensitive data directories -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/home</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/root</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/var/www</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/opt/sensitive-data</directories>

    <!-- Directories to ignore -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <!-- File extensions to ignore -->
    <ignore type="sregex">.log$|.swp$</ignore>

    <!-- No diff for binary/large files -->
    <nodiff>/etc/ssl/private.key</nodiff>
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>

    <!-- Windows-specific FIM (pushed to agents via shared config) -->
    <!-- See agent.conf for Windows FIM configuration -->
  </syscheck>

  <!-- ==================== LOG ANALYSIS ==================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- ==================== ACTIVE RESPONSE ==================== -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- Block attacker IP on firewall -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100200,100201,100210</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- Disable user account on insider threat detection -->
  <command>
    <name>disable-account</name>
    <executable>disable-account</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <command>disable-account</command>
    <location>local</location>
    <rules_id>100300</rules_id>
  </active-response>

  <!-- ==================== RULESET ==================== -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>

    <!-- Custom insider threat rules -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- ==================== API SETTINGS ==================== -->
  <api>
    <bind_addr>0.0.0.0</bind_addr>
    <port>55000</port>
    <https>yes</https>
    <drop_privileges>yes</drop_privileges>
  </api>

</ossec_config>
