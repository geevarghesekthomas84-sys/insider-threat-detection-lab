# Splunk Saved Searches / Correlation Searches - Insider Threat Detection
# Deploy to: $SPLUNK_HOME/etc/apps/insider_threat/local/savedsearches.conf

# ==================== USB EXFILTRATION ====================

[USB Device Connected - After Hours]
search = index=insiderthreat sourcetype=WinEventLog:DriverFrameworks EventCode=20001 \
  | eval hour=strftime(_time, "%H") \
  | where hour >= 20 OR hour <= 5 \
  | table _time, host, DeviceId, DriverName \
  | sort -_time
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
action.email.to = soc-team@insiderthreatlab.local
action.email.subject = ALERT: USB Device Connected After Hours
cron_schedule = */5 * * * *
enableSched = 1
is_visible = 1

[USB STOR Registry Changes]
search = index=sysmon EventCode=13 TargetObject="*USBSTOR*" \
  | table _time, host, User, TargetObject, Details \
  | sort -_time
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3
cron_schedule = */10 * * * *
enableSched = 1

# ==================== POWERSHELL SUSPICIOUS ACTIVITY ====================

[Suspicious PowerShell - Encoded Commands]
search = index=powershell sourcetype=XmlWinEventLog:Microsoft-Windows-PowerShell/Operational EventCode=4104 \
  (ScriptBlockText="*-enc*" OR ScriptBlockText="*-EncodedCommand*" \
  OR ScriptBlockText="*FromBase64String*" OR ScriptBlockText="*DownloadString*" \
  OR ScriptBlockText="*Invoke-Expression*" OR ScriptBlockText="*IEX*" \
  OR ScriptBlockText="*Net.WebClient*") \
  | table _time, host, UserID, ScriptBlockText \
  | sort -_time
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */5 * * * *
enableSched = 1

[PowerShell - Offensive Tool Detection]
search = index=powershell sourcetype=XmlWinEventLog:Microsoft-Windows-PowerShell/Operational EventCode=4104 \
  (ScriptBlockText="*Invoke-Mimikatz*" OR ScriptBlockText="*Invoke-Kerberoast*" \
  OR ScriptBlockText="*Get-Keystrokes*" OR ScriptBlockText="*Invoke-TokenManipulation*" \
  OR ScriptBlockText="*Invoke-CredentialInjection*" OR ScriptBlockText="*Invoke-DCSync*") \
  | table _time, host, UserID, ScriptBlockText \
  | sort -_time
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */2 * * * *
enableSched = 1

[PowerShell - Disable Defender]
search = index=powershell (ScriptBlockText="*Set-MpPreference*DisableRealtimeMonitoring*" \
  OR ScriptBlockText="*Uninstall-WindowsFeature*Defender*") \
  | table _time, host, UserID, ScriptBlockText
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.severity = 5
cron_schedule = */5 * * * *
enableSched = 1

# ==================== AUTHENTICATION ANOMALIES ====================

[After Hours Logon Activity]
search = index=insiderthreat sourcetype=WinEventLog:Security EventCode=4624 \
  | eval hour=strftime(_time, "%H") \
  | where hour >= 22 OR hour <= 5 \
  | eval LogonTypeDesc=case(Logon_Type=2,"Interactive",Logon_Type=3,"Network",Logon_Type=7,"Unlock",Logon_Type=10,"RemoteInteractive",Logon_Type=11,"CachedInteractive") \
  | table _time, host, Account_Name, Logon_Type, LogonTypeDesc, Source_Network_Address \
  | sort -_time
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert.severity = 3
cron_schedule = 0 * * * *
enableSched = 1

[Brute Force - Multiple Failed Logins]
search = index=insiderthreat sourcetype=WinEventLog:Security EventCode=4625 \
  | stats count by Account_Name, Source_Network_Address, host \
  | where count >= 5 \
  | sort -count
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
cron_schedule = */10 * * * *
enableSched = 1

[Failed Login Followed by Success]
search = index=insiderthreat sourcetype=WinEventLog:Security (EventCode=4625 OR EventCode=4624) \
  | sort _time \
  | transaction Account_Name maxspan=10m \
  | where eventcount > 1 AND LIKE(EventCode, "%4624%") AND LIKE(EventCode, "%4625%") \
  | table _time, Account_Name, Source_Network_Address, eventcount
dispatch.earliest_time = -6h
dispatch.latest_time = now
alert.severity = 4
cron_schedule = */15 * * * *
enableSched = 1

[RDP Login from Unusual Source]
search = index=insiderthreat sourcetype=WinEventLog:Security EventCode=4624 Logon_Type=10 \
  | stats count, values(Source_Network_Address) as Sources by Account_Name \
  | where count > 0 \
  | table Account_Name, Sources, count
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert.severity = 3
cron_schedule = 0 */4 * * *
enableSched = 1

# ==================== LOG TAMPERING ====================

[Security Log Cleared]
search = index=insiderthreat sourcetype=WinEventLog:Security EventCode=1102 \
  | table _time, host, Account_Name, Client_Domain \
  | sort -_time
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */2 * * * *
enableSched = 1

[Event Log Clearing Commands]
search = (index=sysmon OR index=powershell) \
  ("wevtutil cl" OR "Clear-EventLog" OR "Remove-EventLog") \
  | table _time, host, User, CommandLine, ScriptBlockText
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.severity = 5
cron_schedule = */5 * * * *
enableSched = 1

# ==================== DATA EXFILTRATION ====================

[Cloud Storage Upload Detection]
search = index=sysmon EventCode=3 \
  (DestinationHostname="*drive.google.com*" OR DestinationHostname="*dropbox.com*" \
  OR DestinationHostname="*mega.nz*" OR DestinationHostname="*onedrive.live.com*" \
  OR DestinationHostname="*wetransfer.com*" OR DestinationHostname="*pastebin.com*") \
  | table _time, host, User, Image, DestinationHostname, DestinationIp, DestinationPort
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.severity = 4
cron_schedule = */5 * * * *
enableSched = 1

[Large File Archive Creation]
search = index=sysmon EventCode=1 \
  (Image="*7z*" OR Image="*rar*" OR Image="*zip*" OR CommandLine="*Compress-Archive*") \
  | table _time, host, User, Image, CommandLine, ParentImage
dispatch.earliest_time = -6h
dispatch.latest_time = now
alert.severity = 3
cron_schedule = */15 * * * *
enableSched = 1

# ==================== CREDENTIAL ACCESS ====================

[LSASS Process Access]
search = index=sysmon EventCode=10 TargetImage="*lsass.exe" \
  NOT SourceImage="C:\\Windows\\System32\\*" \
  | table _time, host, SourceImage, SourceUser, GrantedAccess
dispatch.earliest_time = -1h
dispatch.latest_time = now
alert.severity = 5
cron_schedule = */5 * * * *
enableSched = 1

# ==================== PERSISTENCE ====================

[New Scheduled Task Created]
search = index=insiderthreat sourcetype=WinEventLog:Security EventCode=4698 \
  | table _time, host, Account_Name, Task_Name, Task_Content
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert.severity = 3
cron_schedule = */30 * * * *
enableSched = 1

[Registry Run Key Modification]
search = index=sysmon EventCode=13 \
  (TargetObject="*\\CurrentVersion\\Run*" OR TargetObject="*\\CurrentVersion\\RunOnce*") \
  | table _time, host, User, TargetObject, Details, Image
dispatch.earliest_time = -6h
dispatch.latest_time = now
alert.severity = 4
cron_schedule = */10 * * * *
enableSched = 1

# ==================== COMPOSITE CORRELATION ====================

[Insider Threat Score - Multi-indicator]
search = index=insiderthreat OR index=sysmon OR index=powershell \
  | eval indicator=case( \
    EventCode=1102, "log_cleared", \
    EventCode=4625, "failed_login", \
    EventCode=4624 AND (Logon_Type=10 OR Logon_Type=3), "remote_login", \
    match(CommandLine, "(?i)mimikatz|procdump|lsass"), "cred_theft", \
    match(ScriptBlockText, "(?i)Invoke-|DownloadString|FromBase64"), "susp_powershell", \
    match(TargetObject, "USBSTOR"), "usb_activity", \
    1=1, "other") \
  | where indicator!="other" \
  | stats count by Account_Name, indicator \
  | stats sum(count) as total_score, values(indicator) as indicators by Account_Name \
  | where total_score >= 3 \
  | sort -total_score
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert.severity = 5
cron_schedule = 0 * * * *
enableSched = 1
