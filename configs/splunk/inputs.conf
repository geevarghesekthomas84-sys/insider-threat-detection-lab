# Splunk Universal Forwarder - inputs.conf
# Deploy to: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# Collects Windows event logs for insider threat detection

[default]
host = WIN-INSIDER

# ==================== WINDOWS EVENT LOGS ====================

[WinEventLog://Security]
disabled = 0
start_from = oldest
current_only = 0
evt_resolve_ad_obj = 1
checkpointInterval = 5
index = insiderthreat

[WinEventLog://System]
disabled = 0
start_from = oldest
current_only = 0
checkpointInterval = 5
index = insiderthreat

[WinEventLog://Application]
disabled = 0
start_from = oldest
current_only = 0
checkpointInterval = 5
index = insiderthreat

# ==================== SYSMON ====================

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = 0
start_from = oldest
current_only = 0
renderXml = true
index = sysmon
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational

# ==================== POWERSHELL ====================

[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = 0
start_from = oldest
current_only = 0
renderXml = true
index = powershell
sourcetype = XmlWinEventLog:Microsoft-Windows-PowerShell/Operational

[WinEventLog://Windows PowerShell]
disabled = 0
start_from = oldest
current_only = 0
index = powershell
sourcetype = WinEventLog:Windows PowerShell

# ==================== TERMINAL SERVICES (RDP) ====================

[WinEventLog://Microsoft-Windows-TerminalServices-LocalSessionManager/Operational]
disabled = 0
start_from = oldest
current_only = 0
index = insiderthreat
sourcetype = WinEventLog:TerminalServices

# ==================== WINDOWS DEFENDER ====================

[WinEventLog://Microsoft-Windows-Windows Defender/Operational]
disabled = 0
start_from = oldest
current_only = 0
index = insiderthreat
sourcetype = WinEventLog:WindowsDefender

# ==================== TASK SCHEDULER ====================

[WinEventLog://Microsoft-Windows-TaskScheduler/Operational]
disabled = 0
start_from = oldest
current_only = 0
index = insiderthreat
sourcetype = WinEventLog:TaskScheduler

# ==================== USB / DRIVER EVENTS ====================

[WinEventLog://Microsoft-Windows-DriverFrameworks-UserMode/Operational]
disabled = 0
start_from = oldest
current_only = 0
index = insiderthreat
sourcetype = WinEventLog:DriverFrameworks

# ==================== FILE MONITORING ====================

[monitor://C:\SensitiveData]
disabled = 0
index = insiderthreat
sourcetype = sensitive_files
recursive = true

[monitor://C:\ConfidentialProjects]
disabled = 0
index = insiderthreat
sourcetype = sensitive_files
recursive = true

# ==================== POWERSHELL TRANSCRIPT LOGS ====================

[monitor://C:\PSTranscripts]
disabled = 0
index = powershell
sourcetype = powershell:transcript
recursive = true
